<div class="container">
  <div class="filters">
    <a class="button" routerLink="/catalog" routerLinkActive="active"  [queryParams]="{filter: 'Heads'}"  (click)="filter='Heads'">Heads</a>
    <a class="button" routerLink="/catalog" routerLinkActive="active" [queryParams]="{filter: 'Arms'}"  (click)="filter='Arms'">Arms</a>
    <a class="button" routerLink="/catalog" routerLinkActive="active" [queryParams]="{filter: 'Torsos'}"  (click)="filter='Torsos'">Torsos</a>
    <a class="button" routerLink="/catalog" routerLinkActive="active" [queryParams]="{filter: 'Bases'}"  (click)="filter='Bases'">Bases</a>
    <a class="button" routerLink="/catalog" routerLinkActive="active"  [routerLinkActiveOptions]="{exact: true}" [queryParams]="{filter: ''}"  (click)="filter=''">All</a>
  </div>

  <ul class="products">
    <li class="product-item" *ngFor="let currentProduct of getFilteredProducts()">
     <app-product-details [product]="currentProduct!" (buy)="addToCart(currentProduct!)"></app-product-details>
    </li>
  </ul>
</div>
