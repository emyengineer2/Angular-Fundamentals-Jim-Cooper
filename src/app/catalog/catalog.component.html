<div class="container">
  <div class="filters">
    <a class="button" routerLink="/catalog/Heads" (click)="filter='Heads'">Heads</a>
    <a class="button" routerLink="/catalog/Arms" (click)="filter='Arms'">Arms</a>
    <a class="button" routerLink="/catalog/Torsos" (click)="filter='Torsos'">Torsos</a>
    <a class="button" routerLink="/catalog/Bases" (click)="filter='Bases'">Bases</a>
    <a class="button" routerLink="/catalog" (click)="filter=''">All</a>
  </div>

  <ul class="products">
    <li class="product-item" *ngFor="let currentProduct of getFilteredProducts()">
     <app-product-details [product]="currentProduct!" (buy)="addToCart(currentProduct!)"></app-product-details>
    </li>
  </ul>
</div>
